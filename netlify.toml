# Paivepo Art & Decor — Netlify Configuration

# Force HTTPS and redirect Netlify subdomain to custom domain
[[redirects]]
  from   = "http://paivepo.co.za/*"
  to     = "https://paivepo.co.za/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://paivepo.netlify.app/*"
  to     = "https://paivepo.co.za/:splat"
  status = 301
  force  = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; media-src 'self' blob:; worker-src blob:; form-action 'self';"

# Cache images for 1 week
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Cache assets (fonts, etc.) forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS for 1 day
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Cache JS for 1 day
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"